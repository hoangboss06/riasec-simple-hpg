<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>RIASEC Career Test - HPG Education</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-image: linear-gradient(135deg, #0d47a1, #1976d2), url('https://www.transparenttextures.com/patterns/diamond-upholstery.png');
            background-attachment: fixed;
        }

        /* HEADER PHONG CÁCH WORD */
        .custom-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .custom-header img { height: 30px; }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(255, 193, 7, 0.25);
            animation: fadeIn 0.6s ease;
            margin-bottom: 20px;
        }

        h1 { text-align: center; color: #1e3c72; line-height: 1.4; margin-top: 10px; }

        .guide {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border-left: 6px solid #1e88e5;
        }

        .question {
            background: #f4f7fb;
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="checkbox"] { transform: scale(1.4); cursor: pointer; }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #1e88e5;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #1565c0; transform: translateY(-2px); }

        .progress { height: 10px; background: #ddd; border-radius: 5px; margin: 20px 0; }
        .progress-bar { height: 10px; width: 0%; background: #4CAF50; border-radius: 5px; transition: 0.3s; }

        .result {
            display: none;
            margin-top: 30px;
            padding: 0; /* Để ảnh intro tràn viền */
            border-radius: 15px;
            text-align: center;
            color: white;
            animation: fadeIn 1s ease;
            overflow: hidden;
        }

        .info-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

      /* Ảnh tự động lấp đầy khung chứa và căn giữa */
.full-width-img {
    width: 100%;
    max-width: 100%;
    height: auto;
    display: block;
    margin: 0 auto; /* Căn giữa tuyệt đối */
    border-radius: 10px; /* Bo góc nhẹ để đồng bộ với giao diện */
}

/* Loại bỏ khoảng trống thừa của card ở trang 2 */
#step2.card {
    padding: 15px; 
}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="custom-header">
    <div style="display:flex; align-items:center;">
        <img src="assets/LOGO HPG XÓA PHÔNG.png" alt="Logo">
    </div>
    <div>Hệ thống Giáo dục HPG</div>
    <div>Hotline: 0913.695.186</div>
</div>

<div class="container">
    <div class="card" id="step1">
        <h1>Trắc nghiệm định hướng nghề nghiệp RIASEC</h1>
        
        <div class="guide">
            <h3>Hướng dẫn</h3>
            <p>Hãy đọc từng câu dưới đây. Nếu bạn đồng ý, hãy đánh dấu chọn. Trả lời trung thực theo sở thích của bạn.</p>
            <div class="info-box">
                <input type="text" id="studentName" placeholder="Họ tên học sinh (Bắt buộc)">
                <input type="text" id="class" placeholder="Lớp (Bắt buộc)">
                <input type="text" id="school" placeholder="Trường (Bắt buộc)">
                <input type="text" id="teacher" placeholder="Họ tên giáo viên chủ nhiệm (Bắt buộc)">
                <input type="text" id="parent" placeholder="Họ tên phụ huynh (Bắt buộc)">
                <input type="email" id="parentEmail" placeholder="Email phụ huynh">
                <input type="tel" id="phone" placeholder="Số điện thoại của phụ huynh (Bắt buộc)">
            </div>
            <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
        </div>
        <button onclick="goToStep2()">TIẾP TỤC</button>
    </div>

 <div class="card" id="step2" style="display:none; text-align:center;">
    <div style="width: 100%; overflow: hidden; margin-bottom: 15px;">
        <img src="assets/infor 1.png" class="full-width-img">
    </div>
    <div style="padding: 0 10px;">
        <button onclick="goToStep3()">GIẢI PHÁP HƯỚNG NGHIỆP CHO HỌC SINH THCS</button>
    </div>
</div>

    <div class="card" id="step3" style="display:none;">
        <img src="assets/holland 1.png" style="width:100%; max-width:600px; display:block; margin: 0 auto 10px auto; border-radius: 10px;">
        <img src="assets/holland 2.png" style="width:100%; max-width:600px; display:block; margin: 0 auto 20px auto; border-radius: 10px;">
        <div id="questions"></div>
        <button onclick="showIntroBeforeResult()">Xem kết quả</button>
    </div>

    <div id="result" class="result"></div>
</div>

<script>
const questions = [ "Tôi thích sửa chữa máy móc, thiết bị.", "Tôi thích nghiên cứu khoa học, thí nghiệm.", "Tôi thích thuyết phục và lãnh đạo người khác.", "Tôi thích giúp đỡ người khác giải quyết vấn đề.", "Tôi thích kinh doanh hoặc bán hàng.", "Tôi thích làm việc với sổ sách, giấy tờ.", "Tôi thích làm việc ngoài trời.", "Tôi thích vẽ, thiết kế hoặc sáng tạo nghệ thuật.", "Tôi thích làm việc với con số và dữ liệu.", "Tôi thích quản lý và điều hành công việc.", "Tôi thích tìm hiểu cách mọi thứ vận hành.", "Tôi thích chăm sóc và hỗ trợ người khác.", "Tôi thích tư vấn, hướng dẫn người khác.", "Tôi thích vận hành máy móc.", "Tôi thích sắp xếp và lưu trữ hồ sơ.", "Tôi thích tham gia các hoạt động kinh doanh.", "Tôi thích biểu diễn nghệ thuật.", "Tôi thích phân tích vấn đề logic.", "Tôi thích khởi nghiệp.", "Tôi thích làm việc nhóm và hỗ trợ đồng đội.", "Tôi thích làm thí nghiệm.", "Tôi thích sửa chữa điện, cơ khí.", "Tôi thích sáng tác âm nhạc hoặc viết lách.", "Tôi thích làm kế toán hoặc hành chính.", "Tôi thích làm việc theo quy trình rõ ràng.", "Tôi thích nghiên cứu công nghệ mới.", "Tôi thích thiết kế thời trang hoặc mỹ thuật.", "Tôi thích tham gia công tác xã hội.", "Tôi thích lãnh đạo dự án.", "Tôi thích làm nông nghiệp hoặc kỹ thuật.", "Tôi thích sáng tạo nội dung.", "Tôi thích lắp ráp thiết bị.", "Tôi thích làm việc văn phòng.", "Tôi thích quản lý nhân sự.", "Tôi thích làm công việc kiểm tra, giám sát.", "Tôi thích kinh doanh tự do.", "Tôi thích vận hành công cụ kỹ thuật.", "Tôi thích làm việc với hệ thống dữ liệu.", "Tôi thích nghiên cứu chuyên sâu.", "Tôi thích làm giáo viên hoặc huấn luyện viên.", "Tôi thích thiết kế đồ họa.", "Tôi thích điều hành doanh nghiệp." ];

const mapping = { 1:"R",2:"I",3:"E",4:"S",5:"E",6:"C",7:"R",8:"A",9:"C",10:"E",11:"I",12:"S",13:"S",14:"R",15:"C",16:"E",17:"A",18:"I",19:"E",20:"S",21:"I",22:"R",23:"A",24:"C",25:"C",26:"I",27:"A",28:"S",29:"E",30:"R",31:"A",32:"R",33:"C",34:"E",35:"C",36:"E",37:"R",38:"C",39:"I",40:"S",41:"A",42:"E" };

const images={
    R:"https://images.unsplash.com/photo-1581092160607-ee22621dd758",
    I:"https://images.unsplash.com/photo-1544551763-46a013bb70d5",
    A:"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
    S:"https://images.unsplash.com/photo-1551836022-d5d88e9218df",
    E:"https://images.unsplash.com/photo-1556761175-4b46a572b786",
    C:"https://images.unsplash.com/photo-1554224155-6726b3ff858f"
};

const descriptions = {
    R:"Nhóm Thực tế (R). Thường giỏi các công việc cơ khí hoặc vận động. Ngành học gợi ý: Nông nghiệp, Máy tính, Xây dựng, Cơ khí, Kỹ thuật.",
    I:"Nhóm Nghiên cứu (I). Thích quan sát, phân tích và giải quyết vấn đề. Ngành học gợi ý: Sinh học, Hóa học, Y học, Tâm lý học.",
    A:"Nhóm Nghệ thuật (A). Thích sự sáng tạo, làm việc phi cấu trúc. Ngành học gợi ý: Truyền thông, Mỹ thuật, Thiết kế, Kiến trúc.",
    S:"Nhóm Xã hội (S). Thích làm việc với con người. Ngành học gợi ý: Tư vấn, Điều dưỡng, Giáo dục.",
    E:"Nhóm Quản lý (E). Thích thuyết phục hoặc quản lý người khác. Ngành học gợi ý: Marketing, Bán hàng, Luật, Tài chính.",
    C:"Nhóm Nghiệp vụ (C). Chú trọng chi tiết, có tổ chức. Ngành học gợi ý: Kế toán, Bảo hiểm, Quản trị, Dữ liệu."
};

const container=document.getElementById("questions");
questions.forEach((q,index)=>{
    container.innerHTML+=`
    <div class="question">
        <span>${index+1}. ${q}</span>
        <input type="checkbox" id="q${index+1}" onchange="updateProgress()">
    </div>`;
});

function updateProgress(){
    let checked=document.querySelectorAll("input:checked").length;
    document.getElementById("progressBar").style.width=(checked/42)*100+"%";
}

function calculate(){
    let scores={R:0,I:0,A:0,S:0,E:0,C:0};
    for(let i=1;i<=42;i++){
        if(document.getElementById("q"+i).checked){
            scores[mapping[i]]++;
        }
    }

    let maxScore = Math.max(...Object.values(scores));
    let topGroups = Object.keys(scores).filter(key => scores[key]===maxScore);

    let resultContainer=document.getElementById("result");
    resultContainer.style.display="block";
    resultContainer.style.background="#1e3c72";

    let htmlContent = `
        <div id="intro-slides">
            <div class="intro-page" id="page-1" style="display: block; text-align: center;">
                <img src="assets/intro 1.png" style="width: 100vw; max-width: 100%; height: auto; display: block; border-radius: 0;">
                <div style="padding: 20px;"><button onclick="nextPage(2)">TIẾP THEO</button></div>
            </div>

            <div class="intro-page" id="page-2" style="display: none; text-align: center;">
                <img src="assets/intro 2.png" style="width: 100vw; max-width: 100%; height: auto; display: block; border-radius: 0;">
                <div style="padding: 20px;"><button onclick="nextPage(3)">TIẾP THEO</button></div>
            </div>

            <div class="intro-page" id="page-3" style="display: none; text-align: center;">
                <img src="assets/intro 3.png" style="width: 100vw; max-width: 100%; height: auto; display: block; border-radius: 0;">
                <div style="padding: 20px;"><button onclick="showFinalResults()" style="background: #FFC107; color: #1e3c72;">XEM KẾT QUẢ NGHỀ NGHIỆP</button></div>
            </div>
        </div>

        <div id="final-details" style="display: none; padding: 20px;">
    `;

    topGroups.forEach(group=>{
        htmlContent += `
            <div style="margin-bottom:40px;">
                <h2 style="color:#FFC107;">Bạn thuộc nhóm ${group}</h2>
                <img src="${images[group]}" alt="${group}" style="max-width: 90%; border-radius: 15px;">
                <p style="font-size:18px; padding:0 20px;">${descriptions[group]}</p>
                <hr style="margin:25px 0;border:1px solid rgba(255,255,255,0.3);">
            </div>
        `;
    });

    htmlContent += `
        <p><strong>Điểm số chi tiết:</strong><br>
        R:${scores.R} | I:${scores.I} | A:${scores.A} | S:${scores.S} | E:${scores.E} | C:${scores.C}</p>
        <div style="margin:25px; padding:20px; background:rgba(255,255,255,0.1); border-radius:12px;">
            <strong>Cảm ơn bạn đã tham gia khảo sát.</strong><br><br>
            Kết quả chi tiết đã được ghi nhận và gửi về Số điện thoại đã nhập.
        </div>
        <canvas id="radarChart" style="margin-top:30px; background: rgba(255,255,255,0.05); border-radius:15px; padding:10px;"></canvas>
    </div>`;

    resultContainer.innerHTML = htmlContent;

    const ctx = document.getElementById('radarChart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['R', 'I', 'A', 'S', 'E', 'C'],
            datasets: [{
                label: 'Mức độ phù hợp',
                data: [scores.R, scores.I, scores.A, scores.S, scores.E, scores.C],
                backgroundColor: 'rgba(255, 193, 7, 0.4)',
                borderColor: '#FFC107',
                borderWidth: 3,
                pointBackgroundColor: '#fff'
            }]
        },
        options: {
            scales: {
                r: {
                    angleLines: { color: 'rgba(255,255,255,0.2)' },
                    grid: { color: 'rgba(255,255,255,0.2)' },
                    pointLabels: { color: '#fff', font: { size: 16 } },
                    suggestedMin: 0,
                    suggestedMax: 7
                }
            },
            plugins: { legend: { labels: { color: '#fff' } } }
        }
    });

    fetch("https://script.google.com/macros/s/AKfycbyTl_RYkjsTeI0QpzFToyvgaX8Di2mR4u0dRwwVtCVUS1VJ1sQZyT5uzWHj-lgKL0BP/exec", {
        method: "POST",
        mode: "no-cors",
        body: new URLSearchParams({
            studentName: document.getElementById("studentName").value,
            class: document.getElementById("class").value,
            school: document.getElementById("school").value,
            teacher: document.getElementById("teacher").value,
            parent: document.getElementById("parent").value,
            parentEmail: document.getElementById("parentEmail").value,
            phone: document.getElementById("phone").value,
            R: scores.R, I: scores.I, A: scores.A, S: scores.S, E: scores.E, C: scores.C,
            result: topGroups.join(" & ")
        })
    });
}

function goToStep2(){
    const requiredFields = [
        {id: "studentName", label: "Họ tên học sinh"},
        {id: "class", label: "Lớp"},
        {id: "school", label: "Trường"},
        {id: "teacher", label: "Họ tên giáo viên chủ nhiệm"},
        {id: "parent", label: "Họ tên phụ huynh"},
        {id: "phone", label: "Số điện thoại của phụ huynh"}
    ];

    for (let field of requiredFields) {
        if (!document.getElementById(field.id).value.trim()) {
            alert("Vui lòng điền thông tin: " + field.label);
            document.getElementById(field.id).focus();
            return;
        }
    }

    document.getElementById("step1").style.display="none";
    document.getElementById("step2").style.display="block";
    window.scrollTo(0,0);
}

function goToStep3(){
    document.getElementById("step2").style.display="none";
    document.getElementById("step3").style.display="block";
    window.scrollTo(0,0);
}

function showIntroBeforeResult(){
    document.getElementById("step3").style.display="none";
    calculate();
    window.scrollTo(0,0);
}

function nextPage(pageNum) {
    document.querySelectorAll('.intro-page').forEach(page => {
        page.style.display = 'none';
    });
    const nextPg = document.getElementById('page-' + pageNum);
    if(nextPg) { nextPg.style.display = 'block'; }
    window.scrollTo(0, 0);
}

function showFinalResults() {
    document.getElementById('intro-slides').style.display = 'none';
    document.getElementById('final-details').style.display = 'block';
    window.scrollTo(0, 0);
}
</script>
</body>
</html>
